<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoodNight 收益系統</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("EzhO0x-IABJW4a3Om");
        })();
    </script>
    <style>
        :root { 
            --brand-blue: #0984e3; 
            --brand-cyan: #00cec9; 
            --bg-deep: #05070a; 
            --card-bg: rgba(23, 28, 36, 0.85);
            --border-color: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            font-family: "PingFang TC", "Inter", sans-serif; 
            background: radial-gradient(circle at top right, #0a192f, #05070a); 
            color: #e6edf3; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .card { 
            background: var(--card-bg); 
            width: 100%; 
            max-width: 460px; 
            padding: 40px 30px; 
            border-radius: 32px; 
            border: 1px solid var(--border-color); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            position: relative;
        }

        /* 裝飾性背景光芒 */
        .card::before {
            content: "";
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--brand-blue), transparent, var(--brand-cyan));
            z-index: -1;
            border-radius: 33px;
            opacity: 0.2;
        }

        h1 { 
            background: linear-gradient(135deg, #fff 0%, var(--brand-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center; 
            font-size: 1.8rem; 
            margin-bottom: 35px; 
            font-weight: 800;
            letter-spacing: 2px;
        }
        
        label { color: #8b949e; font-size: 0.8rem; font-weight: 600; margin-left: 10px; margin-bottom: 10px; display: block; text-transform: uppercase; letter-spacing: 1px; }

        input, textarea { 
            width: 100%; padding: 18px; border-radius: 18px; 
            border: 1px solid rgba(255,255,255,0.05); background: rgba(0, 0, 0, 0.3); 
            color: white; font-size: 1.3rem; box-sizing: border-box; 
            outline: none; transition: 0.4s;
        }

        input:focus { border-color: var(--brand-cyan); background: rgba(0, 0, 0, 0.5); }

        .level-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 15px 0 30px 0; }
        .btn-lvl { 
            background: rgba(255, 255, 255, 0.03); color: #8b949e; border: 1px solid rgba(255,255,255,0.05); 
            padding: 15px 0; border-radius: 16px; font-size: 0.9rem; 
            cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-weight: 600;
        }
        .btn-lvl:hover { background: rgba(255, 255, 255, 0.08); color: #fff; }
        .btn-lvl.active { 
            background: linear-gradient(135deg, var(--brand-blue), var(--brand-cyan)); 
            color: white; border: none; 
            box-shadow: 0 10px 20px rgba(0, 206, 201, 0.3);
            transform: translateY(-3px);
        }
        
        /* 結果面板視覺強化 */
        .result-panel { margin-top: 40px; border-radius: 28px; overflow: hidden; background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0.2) 100%); border: 1px solid rgba(255,255,255,0.05); }
        .res-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .res-label { font-size: 0.85rem; color: #8b949e; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        .res-money { font-size: 3.2rem; font-weight: 800; color: #55efc4; text-shadow: 0 0 30px rgba(85, 239, 196, 0.3); }
        
        .details { padding: 25px; font-size: 0.9rem; }
        .row { display: flex; justify-content: space-between; margin-bottom: 15px; color: #c9d1d9; }
        .tax-val { color: #ff7675; font-weight: 600; }
        
        .privacy-box { 
            background: rgba(255, 118, 117, 0.03); border: 1px dashed rgba(255, 118, 117, 0.3); 
            padding: 20px; margin-top: 45px; border-radius: 20px; 
            font-size: 0.85rem; color: #8b949e; line-height: 1.7;
        }

        .contact-form { margin-top: 35px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 30px; }
        .btn-send { 
            background: transparent; color: var(--brand-cyan); border: 1.5px solid var(--brand-cyan); 
            padding: 16px; border-radius: 50px; cursor: pointer; width: 100%; 
            margin-top: 20px; font-weight: 700; transition: 0.3s; letter-spacing: 1px;
        }
        .btn-send:hover { background: var(--brand-cyan); color: #000; box-shadow: 0 0 20px rgba(0, 206, 201, 0.4); }

        .note { font-size: 0.75rem; color: #484f58; margin-top: 50px; text-align: center; }
        .thanks { color: var(--brand-blue); font-weight: bold; margin-top: 15px; font-size: 0.8rem; letter-spacing: 0.5px; opacity: 0.8; }
    </style>
</head>
<body onload="calculate()">

<div class="card">
    <h1>🐱GoodNight 收益系統</h1>

    <div class="input-group">
        <label>魅力值 (Charm)</label>
        <input type="number" id="charm" value="0" oninput="calculate()" onclick="this.select()">
    </div>

    <div class="input-group">
        <label>珍珠等級 (Pearl Level)</label>
        <div class="level-grid">
            <button class="btn-lvl" onclick="selectLvl(1, 0.6)">1 等</button>
            <button class="btn-lvl" onclick="selectLvl(2, 1.2)">2 等</button>
            <button class="btn-lvl" onclick="selectLvl(3, 1.25)">3 等</button>
            <button class="btn-lvl" onclick="selectLvl(4, 1.3)">4 等</button>
            <button class="btn-lvl" onclick="selectLvl(5, 1.35)">5 等</button>
            <button class="btn-lvl" onclick="selectLvl(6, 1.4)">6 等</button>
            <button class="btn-lvl" onclick="selectLvl(7, 1.45)">7 等</button>
            <button class="btn-lvl active" onclick="selectLvl(8, 1.5)">8 等</button>
        </div>
    </div>

    <div class="result-panel">
        <div class="res-header">
            <div class="res-label">預計實領入帳</div>
            <span class="res-money" id="netIncome">$0</span>
        </div>
        <div class="details">
            <div class="row"><span>原始收益估計</span><span id="grossIncome" style="color:#fff;">$0</span></div>
            <div class="row"><span>二代健保 (2.11%)</span><span class="tax-val" id="healthTax">-$0</span></div>
            <div class="row"><span>預扣所得稅 (5.00%)</span><span class="tax-val" id="incomeTax">-$0</span></div>
        </div>
    </div>

    <div class="privacy-box">
        <b style="color:#ff7675; display:block; margin-bottom:8px;">🔒聲明：</b>
        本工具僅供主播試算使用，開發者 <span style="color:white;">我男朋友來了</span> 不涉及、不讀取且不存檔任何收益數據。
        <br>(做這事我又沒錢 ᕕ😄ᕗ)<br>
        若發覺有心人士會計算你的收益，請透過下方表單告知，我將更改網址重新提供。
    </div>

    <div class="contact-form">
        <label>GN名</label>
        <input type="text" id="contactName" placeholder="初次見面😀">
        <label style="margin-top:15px;">內容</label>
        <textarea id="contactMsg" rows="2" placeholder="喜歡你的聲音❤️"></textarea>
        <button id="sendBtn" class="btn-send" onclick="sendMail()">🚀Send</button>
    </div>

    <div class="note">
        我男朋友來了 | 2026.03.31
        <div class="thanks">感謝 賈高賽 數據提供</div>
    </div>
</div>

<script>
    let currentRate = 1.5;
    function selectLvl(lvl, rate) {
        currentRate = rate;
        document.querySelectorAll('.btn-lvl').forEach((btn, index) => {
            btn.classList.toggle('active', index === lvl - 1);
        });
        calculate();
    }

    function calculate() {
        const charm = parseFloat(document.getElementById('charm').value) || 0;
        const gross = (charm / 8) * currentRate;
        let hTax = gross >= 27470 ? Math.round(gross * 0.0211) : 0;
        let iTax = gross >= 88501 ? Math.round(gross * 0.05) : 0;
        const net = Math.floor(gross - hTax - iTax);

        document.getElementById('grossIncome').innerText = '$' + Math.floor(gross).toLocaleString();
        document.getElementById('healthTax').innerText = '-$' + hTax.toLocaleString();
        document.getElementById('incomeTax').innerText = '-$' + iTax.toLocaleString();
        document.getElementById('netIncome').innerText = '$' + (net < 0 ? 0 : net).toLocaleString();
    }

    function sendMail() {
        const btn = document.getElementById('sendBtn');
        const name = document.getElementById('contactName').value;
        const msg = document.getElementById('contactMsg').value;
        if(!name || !msg) { alert('請完整填寫'); return; }

        btn.innerText = "傳送中...";
        btn.disabled = true;

        emailjs.send("service_ftxzhbu", "template_905rmdk", {
            from_name: name,
            message: msg
        }).then(() => {
            alert("回報已送達。");
            document.getElementById('contactName').value = "";
            document.getElementById('contactMsg').value = "";
            btn.innerText = "🚀好啦我會看的";
            btn.disabled = false;
        }, (err) => {
            alert("失敗，請重試。");
            btn.disabled = false;
        });
    }
</script>

</body>
</html>

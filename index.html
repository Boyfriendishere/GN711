<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⭐主播收益計算</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() { emailjs.init("EzhO0x-IABJW4a3Om"); })();
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7EGM9LV95F"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-7EGM9LV95F');
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #0ea5e9;
            --cyan: #22d3ee;
            --cyan-bright: #67e8f9;
            --cyan-glow: rgba(34, 211, 238, 0.45);
            --cyan-dim: rgba(34, 211, 238, 0.14);
            --cyan-border: rgba(34, 211, 238, 0.32);
            --danger: #ff7675;
            --danger-dim: rgba(255, 118, 117, 0.08);
            --danger-border: rgba(255, 118, 117, 0.25);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-hi: rgba(255, 255, 255, 0.09);
            --border: rgba(255, 255, 255, 0.11);
            --t1: rgba(255,255,255,0.94);
            --t2: rgba(255,255,255,0.52);
            --t3: rgba(255,255,255,0.24);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            min-height: 100vh;
            background:
                linear-gradient(135deg, #0d2137 0%, #071018 45%, #030608 100%);
            color: var(--t1);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 52px 20px 88px;
            overflow-x: hidden;
            position: relative;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(80px);
        }
        .orb-1 {
            width: 650px; height: 520px;
            background: radial-gradient(circle, rgba(14,165,233,0.28) 0%, rgba(6,182,212,0.12) 45%, transparent 70%);
            top: -150px; right: -160px;
            animation: orb-drift 14s ease-in-out infinite alternate;
        }
        .orb-2 {
            width: 420px; height: 380px;
            background: radial-gradient(circle, rgba(0,206,201,0.16) 0%, transparent 70%);
            bottom: 5%; left: -80px;
            animation: orb-drift 18s ease-in-out infinite alternate-reverse;
        }
        .orb-3 {
            width: 280px; height: 280px;
            background: radial-gradient(circle, rgba(56,189,248,0.12) 0%, transparent 70%);
            top: 38%; right: 5%;
            animation: orb-drift 11s ease-in-out infinite alternate;
        }

        @keyframes orb-drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(-25px, 35px) scale(1.07); }
        }

        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            background: rgba(10, 20, 35, 0.65);
            border: 1px solid var(--border);
            border-radius: 36px;
            padding: 48px 34px 44px;
            backdrop-filter: blur(48px) saturate(180%);
            -webkit-backdrop-filter: blur(48px) saturate(180%);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.06) inset,
                0 50px 100px rgba(0,0,0,0.6),
                0 0 100px rgba(34,211,238,0.07);
            animation: card-in 0.75s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes card-in {
            from { opacity: 0; transform: translateY(32px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(34,211,238,0.65), transparent);
            border-radius: 50%;
        }

        .card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 200px;
            background: linear-gradient(180deg, rgba(34,211,238,0.06) 0%, transparent 100%);
            border-radius: 36px 36px 0 0;
            pointer-events: none;
        }

        h1 {
            font-family: 'Sora', sans-serif;
            background: linear-gradient(135deg, #ffffff 10%, var(--cyan-bright) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            font-size: 1.75rem;
            margin-bottom: 44px;
            font-weight: 800;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
        }

        h1::after {
            content: '';
            display: block;
            width: 36px; height: 2px;
            background: linear-gradient(90deg, var(--cyan), transparent);
            margin: 14px auto 0;
            border-radius: 2px;
        }

        label {
            font-family: 'Sora', sans-serif;
            color: var(--t2);
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 2px;
            margin-bottom: 10px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group { margin-bottom: 30px; }

        input[type="number"], textarea {
            width: 100%;
            padding: 17px 22px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.07);
            background: rgba(0,0,0,0.28);
            color: white;
            font-family: 'Sora', sans-serif;
            font-size: 1.25rem;
            font-weight: 300;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
            backdrop-filter: blur(12px);
        }

        input[type="number"]:focus, textarea:focus {
            border-color: var(--cyan-border);
            background: rgba(0,0,0,0.42);
            box-shadow: 0 0 0 3px rgba(0,206,201,0.09), 0 0 24px rgba(0,206,201,0.07);
        }

        textarea {
            resize: none;
            font-size: 0.95rem;
            font-weight: 400;
            line-height: 1.65;
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 12px;
        }

        .btn-lvl {
            background: rgba(255,255,255,0.03);
            color: var(--t2);
            border: 1px solid rgba(255,255,255,0.07);
            padding: 15px 0;
            border-radius: 15px;
            font-family: 'Sora', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            backdrop-filter: blur(8px);
        }

        .btn-lvl:hover {
            background: rgba(0,206,201,0.08);
            border-color: rgba(0,206,201,0.2);
            color: #fff;
            transform: translateY(-1px);
        }

        .btn-lvl.active {
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            color: white;
            border: none;
            box-shadow: 0 10px 28px rgba(0,206,201,0.35), 0 0 0 1px rgba(0,230,225,0.2) inset;
            transform: translateY(-3px);
        }

        .result-panel {
            margin-top: 10px;
            border-radius: 26px;
            overflow: hidden;
            border: 1px solid var(--cyan-border);
            background: rgba(0,206,201,0.04);
            backdrop-filter: blur(24px);
            box-shadow: 0 0 50px rgba(0,206,201,0.06), 0 0 0 1px rgba(255,255,255,0.03) inset;
        }

        .res-header {
            padding: 32px 24px 24px;
            text-align: center;
            position: relative;
        }

        .res-header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 20px; right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,206,201,0.2), transparent);
        }

        .res-label {
            font-family: 'Sora', sans-serif;
            font-size: 0.68rem;
            color: var(--t2);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .res-money {
            font-family: 'Sora', sans-serif;
            font-size: 3.4rem;
            font-weight: 800;
            color: var(--cyan-bright);
            text-shadow: 0 0 50px rgba(0,229,224,0.45);
            display: block;
            line-height: 1;
            letter-spacing: -1px;
        }

        .details { padding: 22px 24px 8px; }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 0.88rem;
            color: var(--t2);
        }

        .row:last-child { border-bottom: none; }
        .row .val-white { color: var(--t1); font-weight: 600; font-family: 'Sora', sans-serif; }
        .tax-val { color: var(--danger); font-weight: 600; font-family: 'Sora', sans-serif; }

        .section-gap {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
            margin: 36px 0;
        }

        .privacy-box {
            background: var(--danger-dim);
            border: 1px dashed var(--danger-border);
            padding: 22px 24px;
            border-radius: 20px;
            font-size: 0.82rem;
            color: var(--t2);
            line-height: 1.9;
            backdrop-filter: blur(8px);
        }

        .disc-title {
            color: var(--danger);
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 0.78rem;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 10px;
        }

        .contact-form { margin-top: 32px; }

        .contact-form input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.07);
            background: rgba(0,0,0,0.28);
            color: white;
            font-family: 'Sora', sans-serif;
            font-size: 0.95rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            backdrop-filter: blur(12px);
            margin-bottom: 16px;
        }

        .contact-form input[type="text"]:focus {
            border-color: var(--cyan-border);
            box-shadow: 0 0 0 3px rgba(0,206,201,0.09);
        }

        .btn-send {
            width: 100%;
            background: transparent;
            color: var(--cyan);
            border: 1.5px solid var(--cyan-border);
            padding: 17px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 8px;
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            letter-spacing: 1.5px;
            position: relative;
            overflow: hidden;
        }

        .btn-send::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,206,201,0.1), transparent);
            transition: left 0.5s;
        }

        .btn-send:hover::before { left: 100%; }

        .btn-send:hover {
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            color: #fff;
            border-color: transparent;
            box-shadow: 0 8px 30px rgba(0,206,201,0.35);
            transform: translateY(-2px);
        }

        .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .note {
            font-size: 0.7rem;
            color: var(--t3);
            margin-top: 48px;
            text-align: center;
            line-height: 2.2;
            letter-spacing: 0.3px;
        }

        .thanks {
            color: rgba(9,132,227,0.55);
            font-weight: 700;
            margin-top: 14px;
            font-size: 0.72rem;
            letter-spacing: 0.5px;
        }

        .input-group, .result-panel, .privacy-box, .contact-form {
            animation: fade-up 0.6s cubic-bezier(0.22,1,0.36,1) both;
        }
        .input-group:nth-child(1) { animation-delay: 0.08s; }
        .input-group:nth-child(2) { animation-delay: 0.14s; }
        .result-panel            { animation-delay: 0.2s; }
        .privacy-box             { animation-delay: 0.26s; }
        .contact-form            { animation-delay: 0.32s; }

        @keyframes fade-up {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body onload="calculate()">

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="card">
        <h1>⭐主播收益計算</h1>

        <div class="input-group">
            <label>魅力值 (Charm)</label>
            <input type="number" id="charm" value="0" oninput="calculate()" onclick="this.select()">
        </div>

        <div class="input-group">
            <label>直播房等級 (Room Level)</label>
            <div class="level-grid">
                <button class="btn-lvl" onclick="selectLvl(1, 0.6)">✨ 1 等</button>
                <button class="btn-lvl" onclick="selectLvl(2, 1.2)">✨ 2 等</button>
                <button class="btn-lvl" onclick="selectLvl(3, 1.25)">✨ 3 等</button>
                <button class="btn-lvl" onclick="selectLvl(4, 1.3)">✨ 4 等</button>
                <button class="btn-lvl" onclick="selectLvl(5, 1.35)">✨ 5 等</button>
                <button class="btn-lvl" onclick="selectLvl(6, 1.4)">✨ 6 等</button>
                <button class="btn-lvl" onclick="selectLvl(7, 1.45)">✨ 7 等</button>
                <button class="btn-lvl active" onclick="selectLvl(8, 1.5)">✨ 8 等</button>
            </div>
        </div>

        <div class="result-panel">
            <div class="res-header">
                <div class="res-label">預計實領</div>
                <span class="res-money" id="netIncome">$0</span>
            </div>
            <div class="details">
                <div class="row">
                    <span>原始收益估計</span>
                    <span class="val-white" id="grossIncome">$0</span>
                </div>
                <div class="row">
                    <span>二代健保 (2.11%)</span>
                    <span class="tax-val" id="healthTax">-$0</span>
                </div>
                <div class="row">
                    <span>預扣所得稅 (5.00%)</span>
                    <span class="tax-val" id="incomeTax">-$0</span>
                </div>
            </div>
        </div>

        <div class="section-gap"></div>

        <div class="privacy-box">
            <span class="disc-title">免責聲明</span>
            本工具僅供主播試算使用，開發者不存取任何收益數據<br>
            實際金額依官方為主<br>
            若經紀約相關請再自行計算<br>
            有系統問題或疑慮請透過下方告知
        </div>

        <div class="contact-form">
            <label>名稱</label>
            <input type="text" id="contactName" placeholder="初次見面😀">
            <label>內容</label>
            <textarea id="contactMsg" rows="2" placeholder="喜歡你的聲音❤️"></textarea>
            <button id="sendBtn" class="btn-send" onclick="sendMail()">🚀Send</button>
        </div>

        <div class="note">
            我男朋友來了 | 2026.03.31
            <div class="thanks">感謝 賈高賽 數據提供</div>
        </div>
    </div>

<script>
    let currentRate = 1.5;

    function selectLvl(lvl, rate) {
        currentRate = rate;
        document.querySelectorAll('.btn-lvl').forEach((btn, index) => {
            btn.classList.toggle('active', index === lvl - 1);
        });
        calculate();
    }

    function calculate() {
        const charm = parseFloat(document.getElementById('charm').value) || 0;
        const gross = (charm / 8) * currentRate;
        let hTax = gross >= 27470 ? Math.round(gross * 0.0211) : 0;
        let iTax = gross >= 88501 ? Math.round(gross * 0.05) : 0;
        const net = Math.floor(gross - hTax - iTax);

        document.getElementById('grossIncome').innerText = '$' + Math.floor(gross).toLocaleString();
        document.getElementById('healthTax').innerText = '-$' + hTax.toLocaleString();
        document.getElementById('incomeTax').innerText = '-$' + iTax.toLocaleString();
        document.getElementById('netIncome').innerText = '$' + (net < 0 ? 0 : net).toLocaleString();
    }

    function sendMail() {
        const btn = document.getElementById('sendBtn');
        const name = document.getElementById('contactName').value;
        const msg = document.getElementById('contactMsg').value;
        if (!name || !msg) { alert('請完整填寫'); return; }

        btn.innerText = "傳送中...";
        btn.disabled = true;

        emailjs.send("service_ftxzhbu", "template_905rmdk", {
            from_name: name,
            message: msg
        }).then(() => {
            alert("回報已送達。");
            document.getElementById('contactName').value = "";
            document.getElementById('contactMsg').value = "";
            btn.innerText = "🚀好啦我會看的";
            btn.disabled = false;
        }, () => {
            alert("失敗，請重試。");
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
